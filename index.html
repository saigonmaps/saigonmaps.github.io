<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saigon Maps</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link
      href="https://unpkg.com/maplibre-gl@^5.9.0/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="shared.css" />
    <script src="https://unpkg.com/maplibre-gl@^5.9.0/dist/maplibre-gl.js"></script>
  </head>
  <body>
    <div id="map"></div>

    <div class="layer-switcher">
      <select id="layer-select"></select>
    </div>

    <div id="top-right-controls">
      <!-- Controls will be injected here if needed -->
    </div>

    <div id="opacity-slider-wrapper">
      <input
        type="range"
        id="opacity-slider"
        min="0"
        max="1"
        step="0.01"
        value="0.7"
        aria-label="opacity"
      />
    </div>

    <!-- Image Lightbox (Logic currently commented out in app.js) -->
    <div id="img-lightbox">
      <button id="img-lightbox-close" aria-label="Close Lightbox">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
      <button id="img-lightbox-prev" class="nav-btn" aria-label="Previous Image">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <img id="img-lightbox-img" src="" alt="Lightbox image" />
      <button id="img-lightbox-next" class="nav-btn" aria-label="Next Image">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
